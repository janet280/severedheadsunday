name: Deploy to k3s (EC2)

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  ECR_REGISTRY: 058264155697.dkr.ecr.us-east-1.amazonaws.com
  ECR_REPOSITORY: severed-head-sunday-web
  AWS_REGION: us-east-1

jobs:
  build-and-deploy:
    runs-on: [self-hosted, k3s]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image tag
        run: echo "TAG=${GITHUB_SHA::12}" >> "$GITHUB_ENV"

      - name: Log in to ECR
        run: |
          aws ecr get-login-password --region "$AWS_REGION" | \
            docker login --username AWS --password-stdin "$ECR_REGISTRY"

      - name: Build and push
        env:
          IMAGE: ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ env.TAG }}
          VITE_MEDIA_BASE_URL: ${{ secrets.VITE_MEDIA_BASE_URL }}
          VITE_BACKGROUND_IMAGE_URL: ${{ secrets.VITE_BACKGROUND_IMAGE_URL }}
        run: |
          ./scripts/docker-build.sh
          docker push "$IMAGE"
          docker tag "$IMAGE" "${ECR_REGISTRY}/${ECR_REPOSITORY}:latest"
          docker push "${ECR_REGISTRY}/${ECR_REPOSITORY}:latest"

      - name: Refresh ECR pull secret
        run: ./scripts/k3s-ecr-secret.sh

      - name: Deploy to cluster
        env:
          IMAGE: ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ env.TAG }}
        run: ./scripts/k3s-apply.sh
