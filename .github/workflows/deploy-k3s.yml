name: Deploy to k3s (EC2)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: severed-head-sunday-web
  # GitHub-hosted build target; use linux/arm64 for Graviton EC2.
  BUILD_PLATFORM: linux/amd64

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.coords.outputs.image }}
      tag: ${{ steps.coords.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image coordinates
        id: coords
        run: |
          owner="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          tag="${GITHUB_SHA::12}"
          image="ghcr.io/${owner}/${IMAGE_NAME}"
          echo "image=${image}" >> "$GITHUB_OUTPUT"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "IMAGE=${image}" >> "$GITHUB_ENV"
          echo "TAG=${tag}" >> "$GITHUB_ENV"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        env:
          VITE_MEDIA_BASE_URL: ${{ secrets.VITE_MEDIA_BASE_URL }}
          VITE_BACKGROUND_IMAGE_URL: ${{ secrets.VITE_BACKGROUND_IMAGE_URL }}
        run: |
          PLATFORMS="${BUILD_PLATFORM}" \
            PUSH=1 \
            IMAGE="${IMAGE}:${TAG}" \
            VITE_MEDIA_BASE_URL="${VITE_MEDIA_BASE_URL}" \
            VITE_BACKGROUND_IMAGE_URL="${VITE_BACKGROUND_IMAGE_URL}" \
            ./scripts/docker-build.sh

          if [[ "${GITHUB_REF}" == "refs/heads/main" ]]; then
            docker buildx imagetools create -t "${IMAGE}:latest" "${IMAGE}:${TAG}"
          fi

  deploy:
    needs: build
    runs-on: [self-hosted, k3s]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to cluster
        env:
          IMAGE: ${{ needs.build.outputs.image }}:${{ needs.build.outputs.tag }}
        run: ./scripts/k3s-apply.sh
