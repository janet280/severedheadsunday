apiVersion: apps/v1
kind: Deployment
metadata:
  name: severed-head-sunday-web
  namespace: severed-head-sunday
  labels:
    app.kubernetes.io/name: severed-head-sunday-web
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: severed-head-sunday-web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: severed-head-sunday-web
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 101
        fsGroup: 101
      containers:
        - name: nginx
          image: severed-head-sunday-web:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 128Mi
