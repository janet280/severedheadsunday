# k3s ships Traefik as the default Ingress controller.
# TLS secret is issued by k8s/certificate.yaml (cert-manager).
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: severed-head-sunday-web
  namespace: severed-head-sunday
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - severedheadsunday.band
      secretName: severedheadsunday-tls
  rules:
    - host: severedheadsunday.band
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: severed-head-sunday-web
                port:
                  number: 80
