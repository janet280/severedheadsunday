apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: app-ingress
  namespace: severed-head-sunday
  annotations:
    # Tell K3s to use the built-in Traefik ingress controller
    kubernetes.io/ingress.class: traefik
    # Tell Cert-Manager to automatically issue a certificate using your production issuer
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  tls:
  - hosts:
    - severedheadsunday.band             # <--- Your actual domain name
    secretName: app-tls-secret # <--- Cert-Manager will create this secret automatically
  rules:
  - host: severedheadsunday.band
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: severed-head-sunday-web # <--- Name of your internal K8s service
            port:
              number: 80           # <--- Port your service listens on