# Minikube: build image inside minikube's Docker (see k8s/minikube/README.md).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: severed-head-sunday-web
  namespace: severed-head-sunday
  labels:
    app.kubernetes.io/name: severed-head-sunday-web
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: severed-head-sunday-web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: severed-head-sunday-web
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 101
        fsGroup: 101
      containers:
        - name: nginx
          image: severed-head-sunday-web:local
          imagePullPolicy: Never
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
